<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Soil Sensor AI (Debug)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* 调试信息样式 */
    #debug-info {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #1a1a2e;
      color: #4ade80;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      padding: 10px;
      z-index: 99999;
      max-height: 150px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      border-bottom: 2px solid #4ade80;
    }
    #debug-info.error {
      background: #450a0a;
      color: #fca5a5;
      border-bottom-color: #ef4444;
    }
    /* 为调试信息留出空间 */
    #root {
      margin-top: 150px !important;
    }
  </style>
  <script>
    // 调试日志收集
    window.debugLogs = [];
    window.addDebugLog = function(type, message) {
      const time = new Date().toLocaleTimeString('en-US', { hour12: false });
      const log = `[${time}] [${type}] ${message}`;
      window.debugLogs.push(log);
      const debugDiv = document.getElementById('debug-info');
      if (debugDiv) {
        debugDiv.textContent = window.debugLogs.join('\n');
        debugDiv.scrollTop = debugDiv.scrollHeight;
        if (type === 'ERROR') debugDiv.classList.add('error');
      }
      // 同时输出到控制台
      if (type === 'ERROR') {
        console.error(log);
      } else {
        console.log(log);
      }
    };

    // 捕获全局错误
    window.addEventListener('error', function(e) {
      window.addDebugLog('ERROR', 'Global: ' + e.message + ' at ' + e.filename + ':' + e.lineno);
    });

    // 捕获未处理的Promise错误
    window.addEventListener('unhandledrejection', function(e) {
      window.addDebugLog('ERROR', 'Promise: ' + (e.reason?.message || e.reason));
    });

    // 记录页面加载信息
    window.addDebugLog('INFO', '=== Soil Sensor AI Debug Mode ===');
    window.addDebugLog('INFO', 'User Agent: ' + navigator.userAgent.substring(0, 60) + '...');
    window.addDebugLog('INFO', 'URL: ' + window.location.href);
    
    // 检查关键API支持
    window.addDebugLog('INFO', 'localStorage: ' + (typeof Storage !== 'undefined' ? 'YES' : 'NO'));
    window.addDebugLog('INFO', 'FileReader: ' + (typeof FileReader !== 'undefined' ? 'YES' : 'NO'));
    window.addDebugLog('INFO', 'Fetch API: ' + (typeof fetch !== 'undefined' ? 'YES' : 'NO'));

    // DOM加载完成后的检查
    document.addEventListener('DOMContentLoaded', function() {
      window.addDebugLog('INFO', 'DOMContentLoaded fired');
      const root = document.getElementById('root');
      window.addDebugLog('INFO', 'Root element found: ' + !!root);
    });

    // 检查React是否挂载
    setTimeout(function checkReact() {
      const root = document.getElementById('root');
      if (root) {
        const childCount = root.children.length;
        window.addDebugLog('INFO', 'Root children after 3s: ' + childCount);
        if (childCount === 0) {
          window.addDebugLog('ERROR', 'React has NOT rendered any content!');
          window.addDebugLog('ERROR', 'Please check browser console for errors');
        } else {
          window.addDebugLog('INFO', '✅ React appears to have rendered');
        }
      }
    }, 3000);
    
    // 额外的延迟检查
    setTimeout(function() {
      const root = document.getElementById('root');
      if (root && root.children.length > 0) {
        window.addDebugLog('INFO', '✅ Content still present after 5s');
      }
    }, 5000);
  </script>
  <script type="module" crossorigin src="/soil-sensor-ai/assets/index-BYBcPea6.js"></script>
  <link rel="stylesheet" crossorigin href="/soil-sensor-ai/assets/index-J19DuqL6.css">
</head>
<body>
  <div id="debug-info">Initializing debug mode...</div>
  <div id="root"></div>
</body>
</html>
